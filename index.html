<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住院/佔床名單格式化工具 (純 JS 最終整合穩定版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #1a5276;
            margin-top: 0;
            border-bottom: 2px solid #1a5276;
            padding-bottom: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .status-ready { background-color: #d4edda; color: #155724; }
        
        .control-group {
            margin-bottom: 20px;
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: inline-block;
            background-color: #2980b9;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .file-label:hover { background-color: #21618c; }
        
        .btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #1e8449; }
        .btn:disabled {
            background-color: #bdc3c7 !important;
            cursor: not-allowed;
        }
        
        #file-name-display {
            margin-left: 10px;
            font-style: italic;
            color: #666;
        }
        
        pre {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            max-height: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 住院/佔床病人清單等寬排版工具 (純 JS 最終整合穩定版)</h2>
    
    <div id="engine-status" class="status-badge status-ready">✓ 系統本機環境已就緒 (免網路聯線)</div>
    
    <div class="control-group">
        <label for="fileInput" class="file-label">選擇原始清單 (.txt/.csv)</label>
        <input type="file" id="fileInput" accept=".txt,.csv">
        <span id="file-name-display">尚未選擇檔案</span>
    </div>
    
    <div class="control-group">
        <button id="transformBtn" class="btn" disabled>開始格式化排版</button>
    </div>
    
    <div id="preview-section" style="display:none;">
        <h3>👁️ 排版預覽 (僅顯示前幾筆)</h3>
        <pre id="previewBox"></pre>
    </div>
</div>

<script>
    // 🧬 疾病代碼對照表
    const ICD_MAP = {
        "I480": "Paroxysmal Af", "I48.0": "Paroxysmal Af",
        "I4819": "Persistent Af", "I48.19": "Persistent Af",
        "I471": "SVT", "I47.1": "SVT",
        "I495": "SSS", "I49.5": "SSS",
        "I442": "CAVB", "I44.2": "CAVB",
        "I483": "AFL", "I48.3": "AFL",
        "I470": "VT", "I47.0": "VT",
        "I4891": "Af", "I48.91": "Af",
        "I4811": "Chronic Af", "I48.11": "Chronic Af",
        "I209": "CAD/Angina", "I20.9": "CAD/Angina",
        "R002": "Abnormal heart-beat", "R00.2": "Abnormal heart-beat",
        "I509": "Heart Failure", "I50.9": "Heart Failure",
        "R079": "Chest Pain", "R07.9": "Chest Pain",
        "I441": "2nd-degree AVB", "I44.1": "2nd-degree AVB",
        "Z950": "Pacemaker status", "Z95.0": "Pacemaker status",
        "I498": "Other arrhythmia", "I49.8": "Other arrhythmia",
        "I340": "MR", "I34.0": "MR",
        "R001": "Bradycardia", "R00.1": "Bradycardia",
        "I5022": "Chronic systolic HF", "I50.22": "Chronic systolic HF",
        "I25750": "Unstable angina (post-Tx)", "I25.750": "Unstable angina (post-Tx)",
        "I4820": "Chronic Af", "I48.20": "Chronic Af",
        "I208": "Other Angina", "I20.8": "Other Angina",
        "I70211": "PAD w/ claudication (R)", "I70.211": "PAD w/ claudication (R)",
        "I342": "MS", "I34.2": "MS",
        "I259": "CAD", "I25.9": "CAD",
        "I501": "LV Failure", "I50.1": "LV Failure",
        "E7521": "Fabry disease", "E75.21": "Fabry disease",
        "I2510": "CAD", "I25.10": "CAD",
        "I70244": "PAD w/ ulcer (L)", "I70.244": "PAD w/ ulcer (L)",
        
        // 🆕 最新一輪依需求補入的疾病代碼
        "I25119": "CAD w/ angina", "I25.119": "CAD w/ angina",
        "I4821": "Chronic persistent Af", "I48.21": "Chronic persistent Af",
        "I200": "Unstable Angina", "I20.0": "Unstable Angina",
        "I4892": "AFL", "I48.92": "AFL",
        "I202": "Prinzmetal Angina", "I20.2": "Prinzmetal Angina",
        "I71019": "Thoracic Aortic Dissection", "I71.019": "Thoracic Aortic Dissection",
        "I743": "Lower extremity embolism", "I74.3": "Lower extremity embolism",
        "Z95810": "AICD status", "Z95.810": "AICD status",
        "I70202": "PAD (L)", "I70.202": "PAD (L)",
        "I70201": "PAD (R)", "I70.201": "PAD (R)",
        "I70261": "PAD w/ gangrene (R)", "I70.261": "PAD w/ gangrene (R)",
        "J810": "Acute Pulmonary Edema", "J81.0": "Acute Pulmonary Edema"
    };

    // 🩺 醫事人員對照表
    const DOCTOR_MAP = {
        "0034": "0034郭啟泰", "0334": "0334何建德", "0424": "0424呂侑穎", "0510": "0510陳偉踐",
        "0549": "0549王俊傑", "0799": "0799黃昱彰", "0985": "0985徐子哲", "1059": "1059張捷宇",
        "1199": "1199曾子慈", "1229": "1229黃逸群", "1305": "1305鄭郁雯", "1449": "1449溫明賢",
        "1512": "1512林莞芹", "1605": "1605謝侑叡", "1760": "1760柯毓賢", "1816": "1816謝宜璋",
        "1992": "1992邱凱斌", "2079": "2079張其任", "2089": "2089褚柏顯", "2195": "2195洪國竣",
        "2233": "2233許隆安", "2341": "2341謝舒筠", "2486": "2486陳緯倫", "2545": "2545陳靖蓉",
        "2633": "2633賀萬靖", "2651": "2651賈晉原", "2694": "2694黃柏棣", "2867": "2867周宗川",
        "3015": "3015王俊力", "3228": "3228陳俊吉", "3436": "3436葉勇信", "3656": "3656王朝永",
        "3658": "3658張尚宏", "3976": "3976林佳濱", "3995": "3995謝明哲", "5009": "5009吳家棟",
        "5240": "5240張伯丞", "5265": "5265李振宏", "5278": "5278巫龍昇", "5737": "5737林彥辰",
        "7123": "7123詹益欣", "7172": "7172沃宏達", "7195": "7195周星賢", "7687": "7687陳東藝",
        "7812": "7812董穎璋", "7977": "7977李廣祚", "8276": "8276葉日凱", "8384": "8384何明昀",
        "8390": "8390蕭富致", "8395": "8395顏琨麒", "Q062": "Q062張昱政", "Q213": "Q213許皓森",
        "Q237": "Q237侯冠榕", "Q255": "Q255楊熙恆", "Q307": "Q307唐嘉駿", "Q368": "Q368蔡宗翰",
        "Q427": "Q427許承越", "Q562": "Q562黃仕鴻"
    };

    function getDisplayLength(str) {
        let len = 0;
        for (let i = 0; i < str.length; i++) {
            if (str.charCodeAt(i) > 127) { len += 2; } else { len += 1; }
        }
        return len;
    }

    function padText(str, targetLen) {
        let currentLen = getDisplayLength(str);
        if (currentLen >= targetLen) return str;
        return str + " ".repeat(targetLen - currentLen);
    }

    function getISOWeek(dateString) {
        const normalized = dateString.replace(/\//g, '-');
        const target = new Date(normalized);
        if (isNaN(target.getTime())) return null;
        const dayNr = (target.getDay() + 6) % 7;
        target.setDate(target.getDate() - dayNr + 3);
        const firstThursday = target.valueOf();
        target.setMonth(0, 1);
        if (target.getDay() !== 4) {
            target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
        }
        return 1 + Math.ceil((firstThursday - target) / 604800000);
    }

    document.getElementById("fileInput").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById("file-name-display").innerText = file.name;
        const reader = new FileReader();
        reader.onload = function(evt) {
            rawFileContent = evt.target.result;
            document.getElementById("transformBtn").disabled = false;
        };
        reader.readAsText(file, "UTF-8"); 
    });

    document.getElementById("transformBtn").addEventListener("click", function() {
        if (!rawFileContent) return;
        try {
            const lines = rawFileContent.split(/\r?\n/);
            const outputLines = [];
            const header = `${padText('預住日', 8)}${padText('病歷號', 12)}${padText('主治醫師', 18)}${padText('床等', 8)}主診斷碼 / 疾病名稱`;
            outputLines.push(header);
            outputLines.push("-".repeat(85));
            
            let lastWeekNum = null;
            
            for (let line of lines) {
                if (!line.trim()) continue;
                
                const parts = line.split(',').map(p => p.trim());
                if (parts.length <= 11) continue;
                
                const rawDate = parts[2];     
                const chartNo = parts[4];     
                let docCode = parts[7];     
                const bedType = parts[8];     
                let icdCode = parts[11] || "";    

                let docName = docCode;
                for (let key in DOCTOR_MAP) {
                    if (docCode.includes(key)) {
                        docName = DOCTOR_MAP[key];
                        break;
                    }
                }
                
                let icdName = "Unknown Diagnosis";
                for (let key in ICD_MAP) {
                    if (icdCode.includes(key)) {
                        icdName = ICD_MAP[key];
                        break;
                    }
                }

                let dateStr = "";
                let currentWeekNum = null;
                if (rawDate.includes("/")) {
                    const match = rawDate.match(/(\d{4})\/(\d{2})\/(\d{2})/);
                    if (match) {
                        dateStr = `${match[2]}/${match[3]}`;
                        currentWeekNum = getISOWeek(rawDate);
                    }
                }
                if (!dateStr) { dateStr = rawDate.substring(0, 5); }

                if (lastWeekNum !== null && currentWeekNum !== null && currentWeekNum !== lastWeekNum) {
                    outputLines.push("\n" + "=".repeat(24) + " 🗓️ 跨 週 排 程 分 隔 線 " + "=".repeat(24) + "\n");
                }
                if (currentWeekNum !== null) { lastWeekNum = currentWeekNum; }
                
                const colDate = padText(dateStr, 8);
                const colChart = padText(chartNo, 12);
                const colDoc = padText(docName, 18);
                const colBed = padText(bedType, 8);
                const colIcd = `${icdCode} (${icdName})`;
                
                outputLines.push(`${colDate}${colChart}${colDoc}${colBed}${colIcd}`);
            }
            
            const finalResult = outputLines.join("\n");
            const previewLines = finalResult.split("\n").slice(0, 15).join("\n");
            document.getElementById("previewBox").innerText = previewLines + "\n\n... (其餘部分已成功導出至下載檔案) ...";
            document.getElementById("preview-section").style.display = "block";
            
            const blob = new Blob([finalResult], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            const now = new Date();
            const dateStamp = `${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
            
            link.href = URL.createObjectURL(blob);
            link.download = `formatted_patients_${dateStamp}.txt`;
            link.click();
            
        } catch (err) {
            alert("處理檔案時發生錯誤：" + err.message);
        }
    });
</script>

</body>
</html>
