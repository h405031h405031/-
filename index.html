<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨床預住院清單轉檔工具</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_modules.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .privacy-notice {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            color: #2b6cb0;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 0.9em;
            border-radius: 4px;
        }
        .control-panel {
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.95em;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            font-weight: bold;
        }
        .btn-run { background-color: #38a169; }
        .btn-run:hover { background-color: #2f855a; }
        .btn-download { background-color: #3182ce; }
        .btn-download:hover { background-color: #2b6cb0; }
        .btn:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        
        /* 進度條容器外框 */
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none; /* 預設隱藏 */
            position: relative;
            height: 8px;
            overflow: hidden;
        }
        /* 進度條內部動態條 */
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #3182ce;
            transition: width 0.3s ease;
        }
        .progress-bar.success { background-color: #38a169; }
        .progress-bar.error { background-color: #e53e3e; }

        #previewArea {
            width: 100%;
            height: 450px;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            background-color: #1e1e1e;
            color: #f4f4f4;
            padding: 15px;
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
        }
        .status-msg { font-weight: bold; margin-left: 5px; font-size: 0.95em; }
        .status-success { color: #38a169; }
        .status-error { color: #e53e3e; }
        .status-info { color: #dd6b20; }
    </style>
</head>

<body onload="brython()">

<div class="container">
    <h2>臨床資料轉檔工具 (預住院清單/交班單驗證)</h2>
    <div class="privacy-notice">
        🔒 <strong>隱私安全宣告：</strong>本工具完全於您的瀏覽器本機端 (Client-side) 執行運算，絕不傳輸任何病人隱私資料至外部網路或伺服器，請安心使用。
    </div>

    <div class="control-panel">
        <input type="file" id="fileInput" accept=".txt,.csv" />
        <button class="btn btn-run" id="runBtn" disabled>▶ 開始執行轉檔</button>
        <button class="btn btn-download" id="downloadBtn" disabled>📥 下載轉檔後的 .txt</button>
        <span id="statusMessage" class="status-msg"></span>
    </div>
