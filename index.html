<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨床預住院清單轉檔工具</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_modules.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .privacy-notice {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            color: #2b6cb0;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 0.9em;
            border-radius: 4px;
        }
        .control-panel {
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        /* 按鈕樣式 */
        .btn {
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.95em;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            font-weight: bold;
        }
        /* 綠色執行按鈕 */
        #runBtn { background-color: #38a169; }
        #runBtn:hover:not(:disabled) { background-color: #2f855a; }
        
        /* 藍色下載按鈕 */
        #downloadBtn { background-color: #3182ce; }
        #downloadBtn:hover:not(:disabled) { background-color: #2b6cb0; }
        
        /* 禁用狀態強制變灰 */
        .btn:disabled { 
            background-color: #cbd5e0 !important; 
            color: #718096 !important;
            cursor: not-allowed !important; 
        }
        
        /* 進度條樣式 */
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            position: relative;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #3182ce;
            transition: width 0.3s ease;
        }
        .progress-bar.success { background-color: #38a169; }
        .progress-bar.error { background-color: #e53e3e; }

        #previewArea {
            width: 100%;
            height: 450px;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            background-color: #1e1e1e;
            color: #f4f4f4;
            padding: 15px;
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
        }
        .status-msg { font-weight: bold; margin-left: 5px; font-size: 0.95em; }
        .status-success { color: #38a169; }
        .status-error { color: #e53e3e; }
        .status-info { color: #dd6b20; }
    </style>
</head>

<body onload="brython()">

<div class="container">
    <h2>臨床資料轉檔工具 (預住院清單/交班單驗證)</h2>
    <div class="privacy-notice">
        🔒 <strong>隱私安全宣告：</strong>本工具完全於您的瀏覽器本機端 (Client-side) 執行運算，絕不傳輸任何病人隱私資料至外部網路或伺服器，請安心使用。
    </div>

    <div class="control-panel">
        <input type="file" id="fileInput" accept=".txt,.csv" />
        <button class="btn" id="runBtn" disabled onclick="triggerPythonRun()">▶ 開始執行轉檔</button>
        <button class="btn" id="downloadBtn" disabled>📥 下載轉檔後的 .txt</button>
        <span id="statusMessage" class="status-msg"></span>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <h3>轉換預覽框</h3>
    <textarea id="previewArea" readonly placeholder="請先上傳原始預住院清單檔案，並點擊「開始執行轉檔」..."></textarea>
</div>

<script type="text/javascript">
    const fileInput = document.getElementById('fileInput');
    const runBtn = document.getElementById('runBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMessage = document.getElementById('statusMessage');
    const previewArea = document.getElementById('previewArea');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    // 當使用者「選擇檔案」時，100% 用原生的 JS 點亮綠色執行按鈕
    fileInput.addEventListener('change', function() {
        progressContainer.style.display = "none";
        progressBar.style.width = "0%";
        progressBar.className = "progress-bar";
        previewArea.value = "";

        if (fileInput.files.length > 0) {
            runBtn.removeAttribute('disabled'); // 點亮綠色按鈕
            downloadBtn.setAttribute('disabled', 'disabled');
            statusMessage.textContent = `已選取：${fileInput.files[0].name}，請點擊轉檔。`;
            statusMessage.className = "status-msg status-info";
        } else {
            runBtn.setAttribute('disabled', 'disabled');
        }
    });

    // 觸發自定義的 Python 轉檔事件
    function triggerPythonRun() {
        const event = new CustomEvent('startTransform');
        window.dispatchEvent(event);
    }
</script>

<script type="text/python">
import re
from browser import document, window, bind, timer
from datetime import datetime

DOCTOR_MAP = { "2867": "2867周宗川" }

ICD_MAP = {
    "I480": "Paroxysmal Af", "I4819": "Persistent Af", "I471": "SVT",
    "I495": "SSS", "I442": "CAVB", "I483": "AFL", "I470": "VT",
    "I4891": "Af", "I4811": "Chronic Af", "I209": "CAD/Angina",
    "R002": "Abnormal heart-beat", "I509": "Heart Failure", "R079": "Chest Pain",
    "I441": "2nd-degree AVB", "Z950": "Pacemaker status", "I498": "Other arrhythmia",
    "I340": "MR"
}

final_output_text = ""

def parse_csv_line(line):
    if not line.strip(): return []
    pattern = re.compile(r'([^,"]*|"[^"\\]*(?:\\.[^"\\]*)*")(?:,|$)')
    matches = pattern.findall(line)
    if matches and matches[-1] == '': matches.pop()
    return [m.strip().strip('"').strip() for m in matches]

def process_file_content(raw_text):
    global final_output_text
    lines = raw_text.replace('\r\n', '\n').replace('\r', '\n').split('\n')
    col_widths = {"date": 10, "id": 12, "doc": 14, "bed": 8, "diag": 25}
    
    header = (
        "預住院日".ljust(col_widths["date"]) + "病歷號".ljust(col_widths["id"]) +
        "醫師".ljust(col_widths["doc"]) + "床等".ljust(col_widths["bed"]) + "診斷"
    )
    output_lines = [header]
    current_last_week = None
    valid_row_count = 0

    for line in lines:
        if not line.strip(): continue
        parts = parse_csv_line(line)
        if parts and ("病歷號" in parts[0] or "預住院日" in parts[0] or (len(parts) > 4 and "病歷號" in parts[4])):
            continue
        if len(parts) < 12: continue
            
        raw_date, patient_id, doc_code, bed_info, icd_code = parts[2], parts[4], parts[7], parts[8], parts[11]

        # 1. 日期簡化
        formatted_date = ""
        iso_week = None
        try:
            dt = datetime.strptime(raw_date.split()[0], "%Y/%m/%d")
            formatted_date = dt.strftime("%m/%d")
            iso_week = dt.isocalendar()[1]
        except Exception:
            formatted_date = raw_date[:10] if len(raw_date) >= 10 else raw_date
        
        # 2. 跨週插入分隔線
        if iso_week is not None:
            if current_last_week is not None and iso_week != current_last_week:
                output_lines.append("-" * 70)
            current_last_week = iso_week

        resolved_doc = DOCTOR_MAP.get(doc_code, doc_code)
        resolved_diag = ICD_MAP.get(icd_code, icd_code)

        row_str = (
            formatted_date.ljust(col_widths["date"]) + patient_id.ljust(col_widths["id"]) +
            resolved_doc.ljust(col_widths["doc"]) + bed_info.ljust(col_widths["bed"]) + resolved_diag
        )
        output_lines.append(row_str)
        valid_row_count += 1

    if valid_row_count == 0:
        raise ValueError("無法成功解析任何資料列。請確認該文字檔中第3欄為日期、第5欄為病歷號、第8欄為醫師、第12欄為診斷碼。")

    final_output_text = "\n".join(output_lines)
    return final_output_text, valid_row_count

# 監聽來自網頁 JS 按鈕點擊發送的事件
@bind(window, "startTransform")
def run_transform(evt):
    file_list = document["fileInput"].files
    if not file_list: return
    
    selected_file = file_list[0]
    status_el = document["statusMessage"]
    preview_el = document["previewArea"]
    download_btn = document["downloadBtn"]
    p_container = document["progressContainer"]
    p_bar = document["progressBar"]
    
    p_container.style.display = "block"
    p_bar.className = "progress-bar"
    p_bar.style.width = "20%"
    status_el.text = "正在載入本機端臨床文字檔案..."
    
    def step_2():
        p_bar.style.width = "60%"
        status_el.text = "分析醫令系統 CSV 欄位架構與代碼對照中..."
        
    def step_final():
        reader_big5 = window.FileReader.new()
        
        def on_big5_success(e):
            try:
                raw_content = reader_big5.result
                if "" in raw_content[:100]: raise UnicodeDecodeError("big5", b"", 0, 1, "轉用 UTF-8")
                processed_text, count = process_file_content(raw_content)
                render_success(processed_text, count, "Big5")
            except Exception:
                try_utf8()
                
        def try_utf8():
            reader_utf8 = window.FileReader.new()
            def on_utf8_success(e):
                try:
                    raw_content = reader_utf8.result
                    processed_text, count = process_file_content(raw_content)
                    render_success(processed_text, count, "UTF-8")
                except Exception as ex:
                    render_error(str(ex))
            reader_utf8.bind("load", on_utf8_success)
            reader_utf8.readAsText(selected_file, 'utf-8')

        def render_success(text, count, encoding):
            p_bar.style.width = "100%"
            p_bar.classList.add("success")
            preview_el.text = text
            status_el.text = f"成功轉換 {count} 筆病人資料！({encoding})"
            status_el.className = "status-msg status-success"
            download_btn.removeAttribute("disabled")
            
        def render_error(err_msg):
            p_bar.style.width = "100%"
            p_bar.classList.add("error")
            preview_el.text = f"[資料解析失敗提示]\n\n錯誤原因：{err_msg}\n\n請確認您的 .txt 檔案內是用「逗號 ,」分隔的 CSV 格式。"
            status_el.text = "轉檔失敗"
            status_el.className = "status-msg status-error"

        reader_big5.bind("load", on_big5_success)
        reader_big5.readAsText(selected_file, 'big5')

    timer.set_timeout(step_2, 200)
    timer.set_timeout(step_final, 500)

@bind(document["downloadBtn"], "click")
def trigger_download(evt):
    global final_output_text
    if not final_output_text: return
    blob = window.Blob.new([final_output_text], {"type": "text/plain;charset=utf-8"})
    a = document.createElement("a")
    a.href = window.URL.createObjectURL(blob)
    a.download = f"格式化交班清單_{datetime.now().strftime('%m%d_%H%M')}.txt"
    a.click()
</script>

</body>
</html>
